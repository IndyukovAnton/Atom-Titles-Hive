name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install (root)
        run: npm ci

      - name: Install (backend)
        run: npm ci
        working-directory: backend

      - name: Install (frontend)
        run: npm ci
        working-directory: frontend

      - name: Lint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: Unit tests (frontend)
        run: npm run test:ci
        working-directory: frontend

      - name: Lint (backend)
        run: npm run lint
        working-directory: backend

      - name: Unit tests (backend)
        run: npm run test:ci
        working-directory: backend

      - name: Build (backend)
        run: npm run build
        working-directory: backend

      - name: Build (frontend)
        run: npm run build
        working-directory: frontend
